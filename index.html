        const subjectsList = ["الرياضيات", "الفيزياء والكيمياء", "العلوم الطبيعية", "اللغة العربية", "التربية الإسلامية", "اللغة الفرنسية", "اللغة الإنجليزية"];
        let currentBranch = '';

        // دالة التنقل بين الصفحات بحركة سلسة
        function showPage(id) {
            const current = document.querySelector('.page.active');
            const target = document.getElementById(id);
            if(current === target) return;
            
            // إخفاء الصفحة الحالية
            gsap.to(current, { opacity: 0, y: 20, duration: 0.3, onComplete: () => {
                current.classList.remove('active');
                target.classList.add('active');
                // إظهار الصفحة الجديدة
                gsap.fromTo(target, { opacity: 0, y: -20 }, { opacity: 1, y: 0, duration: 0.4 });
            }});
            window.scrollTo(0,0);
        }

        // فتح الشعبة وعرض موادها
        function openBranch(branch) {
            currentBranch = branch;
            document.getElementById('branch-title').innerText = "شعبة " + branch;
            const grid = document.getElementById('subjects-grid');
            grid.innerHTML = '';
            subjectsList.forEach(s => {
                const card = document.createElement('div');
                card.className = "glass-card p-8 flex justify-between items-center cursor-pointer hover:bg-sky-500/10 group transition-all";
                card.innerHTML = `<span class="text-xl font-black">${s}</span> <i class="fas fa-chevron-left text-sky-500 group-hover:-translate-x-2 transition-transform"></i>`;
                card.onclick = () => openYears(s);
                grid.appendChild(card);
            });
            showPage('subjects-page');
        }

        // فتح المادة وعرض السنوات المتاحة
        function openYears(sub) {
            document.getElementById('sub-title').innerText = sub;
            const grid = document.getElementById('years-grid');
            grid.innerHTML = '';
            
            // دمج الروابط الخاصة والعامة
            const specific = (linksDB[currentBranch] && linksDB[currentBranch][sub]) || {};
            const shared = commonLinks[sub] || {};
            const allLinks = {...shared, ...specific};
            
            // ترتيب السنوات من الأحدث للأقدم
            const years = Object.keys(allLinks).sort((a,b) => b-a);
            
            years.forEach(y => {
                grid.innerHTML += `<div onclick="download('${allLinks[y]}')" class="year-btn cursor-pointer text-center font-bold">${y}</div>`;
            });
            showPage('years-page');
        }

        // التعامل مع التحميل (التحقق من تسجيل الدخول)
        function download(link) {
            if(!localStorage.getItem('bac_user')) { 
                showPage('auth'); 
            } else { 
                window.open(link, '_blank'); 
            }
        }

        // تسجيل الطالب وحفظ اسمه
        function handleAuth(e) {
            e.preventDefault();
            const name = document.getElementById('u-name').value;
            localStorage.setItem('bac_user', name); // حفظ أبدي في المتصفح
            updateUserUI(name);
            showPage('home');
        }

        // تحديث واجهة المستخدم عند وجود مستخدم مسجل
        function updateUserUI(name) {
            const avatar = document.getElementById('user-avatar');
            avatar.innerText = name.trim().charAt(0);
            avatar.style.display = 'flex';
            document.getElementById('login-btn').style.display = 'none';
        }

        // دالة العد التنازلي لباك 2026
        function updateCountdown() {
            // تاريخ الباك التقريبي (29 يونيو 2026)
            const examDate = new Date("June 29, 2026 08:00:00").getTime();
            const now = new Date().getTime();
            const gap = examDate - now;

            if (gap <= 0) {
                document.getElementById("countdown").innerHTML = "<div class='text-2xl font-black text-emerald-400 p-4'>حان وقت الامتحان! بالتوفيق</div>";
                return;
            }

            const d = Math.floor(gap / (1000 * 60 * 60 * 24));
            const h = Math.floor((gap % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((gap % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((gap % (1000 * 60)) / 1000);
            
            document.getElementById("days").innerText = d;
            document.getElementById("hours").innerText = h;
            document.getElementById("minutes").innerText = m;
            document.getElementById("seconds").innerText = s;
        }

        // تشغيل العد التنازلي كل ثانية
        setInterval(updateCountdown, 1000);
        updateCountdown();

        // **التعديل الجوهري (الإصلاح للأبد):** التحقق من المستخدم عند تحميل الصفحة
        window.onload = () => { 
            const savedUser = localStorage.getItem('bac_user');
            if (savedUser) {
                updateUserUI(savedUser);
            }
            // تم حذف سطر removeItem القديم لكي يبقى المستخدم مسجلاً للأبد
        }
